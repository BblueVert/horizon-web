<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>HORIZON OPS · Deep Work</title>
<link rel="icon" type="image/png" href="../Identidad/Logo ISO.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="/OPS/shared/ops.css">
<style>
/* Timer centrado */
.dw-layout{display:grid;grid-template-columns:1fr 340px;gap:16px;}
@media(max-width:900px){.dw-layout{grid-template-columns:1fr;}}

/* Ring SVG */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 0 20px;position:relative;}
.ring-svg{transform:rotate(-90deg);overflow:visible;}
.ring-track{fill:none;stroke:var(--card3);stroke-width:8;}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s ease;}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);text-align:center;}
.ring-time{font-family:var(--fd);font-size:52px;letter-spacing:3px;color:var(--text);line-height:1;}
.ring-label{font-family:var(--fm);font-size:9px;letter-spacing:1.5px;color:var(--text3);margin-top:4px;}

/* Mode pills */
.mode-pills{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.mode-pill{
  padding:6px 16px;border-radius:20px;border:1px solid var(--border2);
  background:var(--card2);font-family:var(--fm);font-size:9px;letter-spacing:.5px;
  color:var(--text3);cursor:pointer;transition:.15s;
}
.mode-pill:hover{border-color:var(--border3);color:var(--text);}
.mode-pill.active{background:linear-gradient(135deg,rgba(255,107,53,.2),rgba(255,140,66,.15));border-color:var(--h1);color:var(--h1);}

/* Controls */
.dw-controls{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}

/* Focus task */
.focus-task-wrap{margin-bottom:20px;}
.focus-task-label{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;}
.focus-task-input{
  width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--fb);font-size:14px;padding:11px 14px;outline:none;transition:.15s;
}
.focus-task-input:focus{border-color:var(--h1);box-shadow:0 0 0 2px rgba(255,107,53,.1);}

/* Stats strip */
.dw-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.dw-stat{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.dw-stat-val{font-family:var(--fd);font-size:22px;color:var(--h1);}
.dw-stat-lbl{font-family:var(--fm);font-size:7px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* Session log */
.session-log{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--card3) transparent;}
.session-log::-webkit-scrollbar{width:3px;}
.session-log::-webkit-scrollbar-thumb{background:var(--card3);}
.sess-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
}
.sess-icon{font-size:16px;flex-shrink:0;}
.sess-body{flex:1;min-width:0;}
.sess-task{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-meta{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:2px;}
.sess-dur{font-family:var(--fd);font-size:16px;color:var(--h1);flex-shrink:0;}

/* Done overlay */
.done-overlay{
  display:none;position:fixed;inset:0;background:rgba(7,6,14,.85);z-index:50;
  align-items:center;justify-content:center;flex-direction:column;gap:20px;
  animation:fadeIn .3s ease;
}
.done-overlay.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.done-icon{font-size:64px;}
.done-title{font-family:var(--fd);font-size:48px;letter-spacing:3px;color:var(--text);}
.done-sub{font-family:var(--fm);font-size:12px;color:var(--text2);letter-spacing:.5px;}
</style>
</head>
<body>
<div class="ops-layout">
  <main class="ops-main">
    <div class="ops-header">
      <div><div class="ops-page-title">Deep Work</div><div class="ops-page-sub" id="dwSub">Sesiones de trabajo enfocado</div></div>
    </div>
    <div class="ops-content">
      <div class="dw-layout">
        <!-- Timer -->
        <div class="ops-card">
          <div class="mode-pills" id="modePills">
            <button class="mode-pill active" onclick="setMode('pomodoro',25,'Pomodoro')" data-key="pomodoro">🍅 Pomodoro 25'</button>
            <button class="mode-pill" onclick="setMode('deep',50,'Deep Work')" data-key="deep">🧠 Deep Work 50'</button>
            <button class="mode-pill" onclick="setMode('flow',90,'Flow State')" data-key="flow">🌊 Flow State 90'</button>
            <button class="mode-pill" onclick="setMode('short',5,'Descanso corto')" data-key="short">☕ Descanso 5'</button>
            <button class="mode-pill" onclick="setMode('long',15,'Descanso largo')" data-key="long">🛋️ Descanso 15'</button>
          </div>

          <div class="ring-wrap">
            <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#ff6b35"/>
                  <stop offset="100%" stop-color="#ff8c42"/>
                </linearGradient>
              </defs>
              <circle class="ring-track" cx="100" cy="100" r="88"/>
              <circle class="ring-fill" id="ringCircle" cx="100" cy="100" r="88"
                stroke-dasharray="553" stroke-dashoffset="0"/>
            </svg>
            <div class="ring-center">
              <div class="ring-time" id="timerDisplay">25:00</div>
              <div class="ring-label" id="timerLabel">LISTO</div>
            </div>
          </div>

          <div class="dw-controls">
            <button class="btn btn-ghost" onclick="resetTimer()">↺ Reset</button>
            <button class="btn btn-primary" id="btnTimer" onclick="toggleTimer()" style="min-width:140px;">▶ Iniciar</button>
          </div>

          <div class="focus-task-wrap">
            <div class="focus-task-label">¿En qué estás trabajando?</div>
            <input id="focusTask" class="focus-task-input" type="text" placeholder="Describe la tarea principal de esta sesión…" maxlength="200">
          </div>

          <button class="btn btn-primary" onclick="saveSession()" style="width:100%;justify-content:center;">
            ✓ Guardar sesión completada
          </button>
        </div>

        <!-- Panel derecho -->
        <div style="display:flex;flex-direction:column;gap:14px;">
          <!-- Stats hoy -->
          <div class="ops-card">
            <div style="font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;">Hoy</div>
            <div class="dw-stats">
              <div class="dw-stat"><div class="dw-stat-val" id="statSesiones">0</div><div class="dw-stat-lbl">Sesiones</div></div>
              <div class="dw-stat"><div class="dw-stat-val" id="statMinutos">0</div><div class="dw-stat-lbl">Minutos</div></div>
              <div class="dw-stat"><div class="dw-stat-val" id="statStreak">0</div><div class="dw-stat-lbl">Racha días</div></div>
            </div>
          </div>

          <!-- Historial sesiones -->
          <div class="ops-card" style="flex:1;">
            <div style="font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:12px;">Sesiones recientes</div>
            <div class="session-log" id="sessionLog">
              <div class="ops-loading"><div class="ops-spinner"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Done overlay -->
<div class="done-overlay" id="doneOverlay" onclick="this.classList.remove('show')">
  <div class="done-icon">🎯</div>
  <div class="done-title">¡SESIÓN COMPLETADA!</div>
  <div class="done-sub" id="doneMessage">Excelente trabajo. Hacé clic para cerrar.</div>
</div>

<script src="/OPS/shared/ops-auth.js"></script>
<script src="/OPS/shared/ops-nav.js"></script>
<script>
const CIRCUMFERENCE = 2 * Math.PI * 88; // ~553
let totalSec=25*60, remaining=25*60, running=false, interval=null, currentModeName='Pomodoro';

function setMode(key, mins, name){
  if(running) return;
  currentModeName=name; totalSec=mins*60; remaining=mins*60;
  updateDisplay();
  document.getElementById('timerLabel').textContent='LISTO';
  document.getElementById('btnTimer').textContent='▶ Iniciar';
  document.querySelectorAll('.mode-pill').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
}

function fmt(s){ return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function updateDisplay(){
  document.getElementById('timerDisplay').textContent=fmt(remaining);
  const pct=remaining/totalSec;
  const offset=CIRCUMFERENCE*(1-pct);
  document.getElementById('ringCircle').style.strokeDashoffset=offset;
}

function toggleTimer(){
  if(running){
    clearInterval(interval); running=false;
    document.getElementById('btnTimer').textContent='▶ Continuar';
    document.getElementById('timerLabel').textContent='PAUSADO';
  } else {
    running=true;
    document.getElementById('btnTimer').textContent='⏸ Pausar';
    document.getElementById('timerLabel').textContent='EN CURSO';
    interval=setInterval(()=>{
      remaining--;
      updateDisplay();
      if(remaining<=0){
        clearInterval(interval); running=false; remaining=0;
        document.getElementById('timerLabel').textContent='¡LISTO!';
        document.getElementById('btnTimer').textContent='▶ Iniciar';
        playAlarm();
        showDone();
      }
    },1000);
  }
}

function resetTimer(){
  clearInterval(interval); running=false; remaining=totalSec;
  updateDisplay();
  document.getElementById('timerLabel').textContent='LISTO';
  document.getElementById('btnTimer').textContent='▶ Iniciar';
}

function playAlarm(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const tones=[523,659,784,1047]; // C5 E5 G5 C6
    tones.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=freq;
      osc.type='sine';
      const t=ctx.currentTime+i*0.2;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.3,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.4);
    });
  }catch(e){}
  // Vibración si disponible
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}

function showDone(){
  const task=document.getElementById('focusTask').value.trim();
  const mins=Math.round(totalSec/60);
  document.getElementById('doneMessage').textContent=`${mins} min de ${currentModeName}${task?' · '+task:''}. Hacé clic para cerrar.`;
  document.getElementById('doneOverlay').classList.add('show');
  // Auto-save
  if(task) autoSaveSession(task, mins);
}

async function autoSaveSession(task, mins){
  const sb=getSB();
  await sb.from('notas').insert({titulo:`Deep Work: ${task}`,contenido:`${mins} min · ${currentModeName} · ${new Date().toLocaleDateString('es-CL')}`,color:'deepwork'});
  loadSessions();
}

async function saveSession(){
  const task=document.getElementById('focusTask').value.trim();
  if(!task){opsToast('Escribí en qué trabajaste','error');return;}
  const mins=Math.round((totalSec-remaining)/60)||Math.round(totalSec/60);
  const sb=getSB();
  await sb.from('notas').insert({titulo:`Deep Work: ${task}`,contenido:`${mins} min · ${currentModeName} · ${new Date().toLocaleDateString('es-CL')}`,color:'deepwork'});
  document.getElementById('focusTask').value='';
  loadSessions();
  opsToast('Sesión guardada ✓');
}

async function loadSessions(){
  const sb=getSB();
  const {data}=await sb.from('notas').select('*').like('titulo','Deep Work:%').order('created_at',{ascending:false}).limit(10);
  const el=document.getElementById('sessionLog');
  if(!data?.length){el.innerHTML=`<div class="ops-empty"><div class="ops-empty-text">Sin sesiones aún. ¡Empezá el timer!</div></div>`;return;}

  // Stats hoy
  const today=new Date().toLocaleDateString('es-CL');
  const todaySess=data.filter(s=>new Date(s.created_at).toLocaleDateString('es-CL')===today);
  const todayMins=todaySess.reduce((sum,s)=>{const m=parseInt((s.contenido||'').match(/(\d+) min/)?.[1]||0);return sum+m;},0);
  document.getElementById('statSesiones').textContent=todaySess.length;
  document.getElementById('statMinutos').textContent=todayMins;

  // Racha (días únicos consecutivos hasta hoy)
  const days=[...new Set(data.map(s=>new Date(s.created_at).toLocaleDateString('es-CL')))].sort().reverse();
  let streak=0;
  const d=new Date();
  for(const day of days){
    if(d.toLocaleDateString('es-CL')===day){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  document.getElementById('statStreak').textContent=streak;
  document.getElementById('dwSub').textContent=`${data.length} sesiones totales · ${todayMins} min hoy`;

  el.innerHTML=data.map(s=>{
    const task=s.titulo.replace('Deep Work: ','');
    const meta=s.contenido||'';
    const mins=meta.match(/(\d+) min/)?.[1]||'?';
    const icon=meta.includes('Flow')? '🌊':meta.includes('Deep')? '🧠':meta.includes('Descanso')? '☕':'🍅';
    return `<div class="sess-item">
      <div class="sess-icon">${icon}</div>
      <div class="sess-body"><div class="sess-task">${task}</div><div class="sess-meta">${meta}</div></div>
      <div class="sess-dur">${mins}'</div>
    </div>`;
  }).join('');
}

// Init display
updateDisplay();

(async function(){
  const session=await opsRequireAuth(); if(!session)return;
  await opsInitNav();
  loadSessions();
})();
</script>
</body>
</html>
