<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HORIZON OPS · Agente IA</title>
<link rel="icon" type="image/png" href="../Identidad/Logo ISO.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="/OPS/shared/ops.css">
<style>
/* Layout del agente: todo el main es flex column */
.ops-main{display:flex;flex-direction:column;overflow:hidden;}
.agente-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0;}

/* Mode toggle */
.mode-bar{
  display:flex;align-items:center;gap:12px;
  padding:14px 28px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--void);
}
.mode-toggle{
  display:flex;gap:2px;background:var(--card2);border-radius:8px;padding:3px;
}
.mode-btn{
  padding:7px 18px;border-radius:6px;border:none;
  font-family:var(--fm);font-size:10px;letter-spacing:.5px;
  cursor:pointer;transition:.15s;color:var(--text3);background:none;
}
.mode-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.mode-btn.active.socio{color:var(--h1);}
.mode-btn.active.tecnico{color:var(--indigo2);}
.mode-desc{font-family:var(--fm);font-size:9px;color:var(--text3);flex:1;}

/* Selector de proyecto (modo técnico) */
.proyecto-selector{
  display:none;align-items:center;gap:10px;
  padding:10px 28px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--card);
}
.proyecto-selector.visible{display:flex;}
.proyecto-selector select{
  background:var(--card2);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:var(--fm);font-size:10px;padding:6px 10px;
  outline:none;-webkit-appearance:none;
}
.proyecto-selector label{font-family:var(--fm);font-size:9px;color:var(--text3);}

/* Chat área */
.chat-messages{
  flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:var(--card3) transparent;
}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--card3);border-radius:2px;}

.msg{display:flex;gap:12px;max-width:75%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.agente{align-self:flex-start;}
.msg-avatar{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--h1),var(--h2));}
.msg.agente .msg-avatar{background:linear-gradient(135deg,var(--indigo),var(--indigo2));}
.msg-bubble{
  padding:11px 15px;border-radius:10px;
  font-size:13px;line-height:1.65;
}
.msg.user .msg-bubble{
  background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.2);color:var(--text);
  border-bottom-right-radius:2px;
}
.msg.agente .msg-bubble{
  background:var(--card);border:1px solid var(--border2);color:var(--text);
  border-bottom-left-radius:2px;
}
.msg-bubble p{margin-bottom:8px;}
.msg-bubble p:last-child{margin-bottom:0;}
.msg-bubble strong{color:var(--text);font-weight:600;}
.msg-bubble code{font-family:var(--fm);font-size:11px;background:var(--card2);padding:1px 5px;border-radius:3px;}

/* Typing indicator */
.typing-dots{display:inline-flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--text3);
  animation:typing .9s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes typing{0%,60%,100%{opacity:.2;transform:scale(.8);}30%{opacity:1;transform:scale(1);}}

/* Empty state */
.chat-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;text-align:center;padding:40px;
}
.chat-empty-icon{font-size:40px;opacity:.25;}
.chat-empty-title{font-family:var(--fd);font-size:28px;letter-spacing:2px;color:var(--text2);}
.chat-empty-hints{display:flex;flex-direction:column;gap:8px;max-width:420px;}
.chat-hint{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:.15s;
  text-align:left;
}
.chat-hint:hover{border-color:var(--border2);color:var(--text);}

/* Input area */
.chat-input-area{
  padding:16px 28px 20px;border-top:1px solid var(--border);flex-shrink:0;
}
.chat-input-wrap{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--card);border:1px solid var(--border2);border-radius:10px;
  padding:10px 14px;transition:.15s;
}
.chat-input-wrap:focus-within{border-color:var(--h1);}
.chat-input{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:var(--fb);font-size:13px;line-height:1.5;resize:none;
  max-height:120px;overflow-y:auto;
}
.chat-input::placeholder{color:var(--text3);}
.chat-send{
  background:linear-gradient(135deg,var(--h1),var(--h2));
  border:none;border-radius:7px;width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.15s;
}
.chat-send:hover:not(:disabled){filter:brightness(1.1);}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}
.chat-send svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.chat-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;font-family:var(--fm);font-size:8px;color:var(--text3);
}
.chat-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--fm);font-size:8px;letter-spacing:.5px;padding:2px 6px;border-radius:4px;transition:.15s;}
.chat-clear:hover{color:var(--red);background:rgba(239,68,68,.06);}
</style>
</head>
<body>
<div class="ops-layout">
  <main class="ops-main">
    <div class="ops-header" style="flex-shrink:0;">
      <div>
        <div class="ops-page-title">Agente HORIZON</div>
        <div class="ops-page-sub">Consultor interno · IA con contexto real del negocio</div>
      </div>
    </div>

    <div class="agente-body">
      <!-- Mode toggle -->
      <div class="mode-bar">
        <div class="mode-toggle">
          <button class="mode-btn active socio" id="btnSocio" onclick="setModo('socio')">💼 Socio de Negocios</button>
          <button class="mode-btn tecnico" id="btnTecnico" onclick="setModo('tecnico')">⚙️ Líder Técnico</button>
        </div>
        <span class="mode-desc" id="modeDesc">Analiza métricas, pipeline y prioridades de HORIZON</span>
      </div>

      <!-- Selector proyecto (modo técnico) -->
      <div class="proyecto-selector" id="proySelector">
        <label>Proyecto activo:</label>
        <select id="proySelect" onchange="onProyChange()">
          <option value="">Seleccionar proyecto…</option>
        </select>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">
          <div class="chat-empty-icon">🤖</div>
          <div class="chat-empty-title">Agente listo</div>
          <div class="chat-empty-hints" id="chatHints"></div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Escribí tu consulta…" rows="1"
            onkeydown="onInputKey(event)" oninput="autoResize(this)"></textarea>
          <button class="chat-send" id="btnSend" onclick="sendMsg()" title="Enviar (Enter)">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="chat-meta">
          <span id="msgCount">0 mensajes en esta sesión</span>
          <button class="chat-clear" onclick="clearChat()">✕ Limpiar conversación</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/OPS/shared/ops-auth.js"></script>
<script src="/OPS/shared/ops-nav.js"></script>
<script>
let modo       = 'socio';
let historial  = [];   // [{role:'user'|'agente', content:string}]
let dashData   = null; // contexto del dashboard
let proyectos  = [];   // lista de proyectos
let proyActivo = null; // proyecto seleccionado en modo técnico

const HINTS = {
  socio: [
    '¿Cuánto vale el pipeline actual en CLP?',
    '¿Qué lead tiene más probabilidad de cerrar esta semana?',
    '¿Qué plan estoy vendiendo más?',
    '¿Cuánto MRR podría sumar si cierro los leads en arranque?',
  ],
  tecnico: [
    '¿Qué hitos están pendientes en este proyecto?',
    '¿Qué está bloqueando el avance?',
    'Armame un backlog de tareas para el próximo sprint.',
    '¿Qué riesgos técnicos ves en este proyecto?',
  ],
};

const MODE_DESC = {
  socio:   'Analiza métricas, pipeline y prioridades de HORIZON',
  tecnico: 'Arquitecto de soluciones — analiza el proyecto activo',
};

function setModo(m) {
  modo = m;
  document.getElementById('btnSocio').classList.toggle('active', m === 'socio');
  document.getElementById('btnTecnico').classList.toggle('active', m === 'tecnico');
  document.getElementById('modeDesc').textContent = MODE_DESC[m];
  document.getElementById('proySelector').classList.toggle('visible', m === 'tecnico');
  renderHints();
}

function renderHints() {
  const empty = document.getElementById('chatEmpty');
  if (historial.length > 0) { empty.style.display = 'none'; return; }
  empty.style.display = 'flex';
  document.getElementById('chatHints').innerHTML = HINTS[modo].map(h =>
    `<button class="chat-hint" onclick="sendDirect('${h.replace(/'/g,"\\'")}')">→ ${h}</button>`
  ).join('');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function sendDirect(text) {
  document.getElementById('chatInput').value = text;
  sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';

  // Ocultar empty state
  document.getElementById('chatEmpty').style.display = 'none';

  appendMsg('user', msg);
  historial.push({ role: 'user', content: msg });
  updateCount();

  // Typing indicator
  const typingId = 'typing-' + Date.now();
  appendTyping(typingId);
  document.getElementById('btnSend').disabled = true;

  // Contexto según el modo
  const contexto = buildContexto();

  try {
    const headers = await opsAuthHeaders();
    const r = await fetch('/api/ops/agente', {
      method: 'POST', headers,
      body: JSON.stringify({ modo, mensaje: msg, contexto, historial: historial.slice(-10) }),
    });
    const data = await r.json();

    removeTyping(typingId);

    if (!r.ok || !data.ok) {
      appendMsg('agente', '⚠️ ' + (data.error || 'Error del agente. Intentá de nuevo.'), true);
      return;
    }

    appendMsg('agente', data.respuesta);
    historial.push({ role: 'agente', content: data.respuesta });
    updateCount();
  } catch (err) {
    removeTyping(typingId);
    appendMsg('agente', '⚠️ Error de conexión. Verificá que el servidor esté corriendo.', true);
  } finally {
    document.getElementById('btnSend').disabled = false;
  }
}

function buildContexto() {
  if (modo === 'socio' && dashData) {
    return {
      mrr:       dashData.mrr,
      pipeline:  dashData.pipeline,
      proyectos: dashData.proyectos,
      leads:     (dashData.leads || []).map(l => ({
        nombre: l.nombre, plan: l.plan, status: l.status,
        tipoprecio: l.tipoprecio, mrr: l.mrr,
      })),
      reuniones_proximas: dashData.reuniones?.length || 0,
    };
  }
  if (modo === 'tecnico' && proyActivo) {
    return {
      proyecto: {
        nombre:    proyActivo.nombre,
        plan:      proyActivo.plan,
        estado:    proyActivo.estado,
        cliente:   proyActivo.lead?.nombre,
        empresa:   proyActivo.lead?.empresa,
        mrr:       proyActivo.lead?.mrr,
      },
      milestones: (proyActivo.milestones || []).map(m => ({
        nombre: m.nombre, estado: m.estado,
      })),
    };
  }
  return null;
}

function appendMsg(role, content, isError = false) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatar = role === 'user' ? '👤' : '🤖';
  const formatted = role === 'agente'
    ? content.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>')
    : content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble${isError?' badge-red':''}">${role === 'agente' ? '<p>' + formatted + '</p>' : formatted}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function appendTyping(id) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg agente';
  div.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function updateCount() {
  document.getElementById('msgCount').textContent = `${historial.length} mensaje${historial.length !== 1 ? 's' : ''} en esta sesión`;
}

function clearChat() {
  historial = [];
  document.getElementById('chatMessages').innerHTML =
    `<div class="chat-empty" id="chatEmpty"><div class="chat-empty-icon">🤖</div>
     <div class="chat-empty-title">Agente listo</div>
     <div class="chat-empty-hints" id="chatHints"></div></div>`;
  renderHints();
  updateCount();
}

async function onProyChange() {
  const id = document.getElementById('proySelect').value;
  if (!id) { proyActivo = null; return; }
  const sb = getSB();
  const { data } = await sb.from('projects')
    .select(`*, lead:leads(nombre,empresa,mrr), milestones:project_milestones(nombre,estado)`)
    .eq('id', id).single();
  proyActivo = data;
}

async function loadProyectos() {
  const sb = getSB();
  const { data } = await sb.from('projects')
    .select('id, nombre, plan, lead:leads(nombre)')
    .neq('estado', 'entregado')
    .order('created_at', { ascending: false });
  proyectos = data || [];
  const sel = document.getElementById('proySelect');
  proyectos.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = (p.lead?.nombre || p.nombre) + ' — ' + (p.plan || '');
    sel.appendChild(opt);
  });
}

async function loadDashContext() {
  try {
    const headers = await opsAuthHeaders();
    const r = await fetch('/api/ops/dashboard', { headers });
    if (r.ok) dashData = await r.json();
  } catch {}
}

(async function(){
  const session = await opsRequireAuth();
  if (!session) return;
  await opsInitNav();
  renderHints();
  await Promise.all([loadProyectos(), loadDashContext()]);
})();
</script>
</body>
</html>
