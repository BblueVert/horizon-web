<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>HORIZON OPS · Agente IA</title>
<link rel="icon" type="image/png" href="../Identidad/Logo ISO.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="/OPS/shared/ops.css">
<style>
/* Layout de 3 columnas: nav-ops | sidebar-chats | chat */
html,body{height:100%;overflow:hidden;}
.agente-root{display:grid;grid-template-columns:var(--sidebar) 260px 1fr;height:100vh;overflow:hidden;}

/* ── Sidebar chats ── */
.chats-sidebar{
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--panel);
}
.chats-top{padding:16px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.chats-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.chats-title{font-family:var(--fd);font-size:18px;letter-spacing:1.5px;color:var(--text);}
.chats-new{background:linear-gradient(135deg,var(--h1),var(--h2));border:none;border-radius:6px;
  color:#fff;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.chats-new:hover{filter:brightness(1.1);}
.chats-search{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:var(--fm);font-size:10px;padding:6px 10px;outline:none;}
.chats-search:focus{border-color:var(--h1);}

.chats-list{flex:1;overflow-y:auto;padding:8px 8px;scrollbar-width:thin;scrollbar-color:var(--card3) transparent;}
.chats-list::-webkit-scrollbar{width:3px;}
.chats-list::-webkit-scrollbar-thumb{background:var(--card3);}

.chat-item{
  padding:10px 10px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:2px;
  border:1px solid transparent;position:relative;
}
.chat-item:hover{background:var(--card2);border-color:var(--border);}
.chat-item.active{background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.2);}
.chat-item-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:20px;}
.chat-item-preview{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:var(--fm);}
.chat-item-date{font-family:var(--fm);font-size:8px;color:var(--text3);margin-top:3px;}
.chat-item-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;
  color:var(--text3);cursor:pointer;font-size:13px;opacity:0;transition:.15s;}
.chat-item:hover .chat-item-del{opacity:1;}
.chat-item-del:hover{color:var(--red);}

.chat-tipo{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:7px;
  letter-spacing:.5px;border-radius:3px;padding:1px 5px;margin-top:3px;}
.tipo-libre{background:var(--card3);color:var(--text3);}
.tipo-proyecto{background:rgba(99,102,241,.1);color:var(--indigo2);}
.tipo-lead{background:rgba(255,107,53,.1);color:var(--h2);}

.chats-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:10px;padding:24px;text-align:center;}
.chats-empty-icon{font-size:28px;opacity:.25;}
.chats-empty-text{font-family:var(--fm);font-size:9px;color:var(--text3);letter-spacing:.5px;}

/* ── Chat área ── */
.chat-area{display:flex;flex-direction:column;overflow:hidden;background:var(--void);}

/* Mode selector */
.mode-bar{
  padding:12px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  background:var(--panel);
}
.chat-area-title{font-size:13px;font-weight:600;color:var(--text);flex:1;cursor:text;}
.chat-area-title[contenteditable]:focus{outline:none;border-bottom:1px solid var(--h1);}
.mode-toggle{display:flex;gap:2px;background:var(--card2);border-radius:7px;padding:3px;}
.mode-btn{padding:5px 14px;border-radius:5px;border:none;font-family:var(--fm);font-size:9px;
  letter-spacing:.5px;cursor:pointer;transition:.15s;color:var(--text3);background:none;}
.mode-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.mode-btn.active.socio{color:var(--h1);}
.mode-btn.active.tecnico{color:var(--indigo2);}

/* Messages */
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:var(--card3) transparent;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--card3);}

.msg{display:flex;gap:10px;max-width:80%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.agente{align-self:flex-start;}
.msg-avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--h1),var(--h2));}
.msg.agente .msg-avatar{background:linear-gradient(135deg,var(--indigo),var(--indigo2));}
.msg-bubble{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;}
.msg.user .msg-bubble{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.18);color:var(--text);border-bottom-right-radius:2px;}
.msg.agente .msg-bubble{background:var(--card);border:1px solid var(--border2);color:var(--text);border-bottom-left-radius:2px;}
.msg-bubble p{margin-bottom:7px;}
.msg-bubble p:last-child{margin-bottom:0;}
.msg-bubble strong{font-weight:600;color:var(--text);}
.msg-bubble code{font-family:var(--fm);font-size:11px;background:var(--card2);padding:1px 5px;border-radius:3px;}
.msg-bubble pre{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;overflow-x:auto;margin:8px 0;}
.msg-bubble pre code{background:none;padding:0;}
.msg-time{font-family:var(--fm);font-size:7px;color:var(--text3);margin-top:4px;display:block;}

/* Typing */
.typing-dots{display:inline-flex;gap:4px;align-items:center;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tdots .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s;}
.typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes tdots{0%,60%,100%{opacity:.2;transform:scale(.8);}30%{opacity:1;transform:scale(1);}}

/* Empty state */
.chat-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;}
.chat-welcome-icon{font-size:48px;opacity:.2;}
.chat-welcome-title{font-family:var(--fd);font-size:32px;letter-spacing:2px;color:var(--text2);}
.chat-hints{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;width:100%;}
.chat-hint{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 14px;
  font-size:12px;color:var(--text2);cursor:pointer;transition:.15s;text-align:left;line-height:1.4;}
.chat-hint:hover{border-color:var(--border2);color:var(--text);}
.chat-hint strong{display:block;font-size:11px;color:var(--h1);margin-bottom:3px;font-family:var(--fm);letter-spacing:.3px;}

/* Input */
.chat-input-area{padding:14px 20px 18px;border-top:1px solid var(--border);flex-shrink:0;}
.chat-input-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--card);
  border:1px solid var(--border2);border-radius:10px;padding:10px 14px;transition:.15s;}
.chat-input-wrap:focus-within{border-color:var(--h1);}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--fb);
  font-size:13px;line-height:1.5;resize:none;max-height:120px;overflow-y:auto;}
.chat-input::placeholder{color:var(--text3);}
.chat-send{background:linear-gradient(135deg,var(--h1),var(--h2));border:none;border-radius:7px;
  width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s;}
.chat-send:hover:not(:disabled){filter:brightness(1.1);}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}
.chat-send svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.chat-meta{display:flex;justify-content:space-between;margin-top:7px;font-family:var(--fm);font-size:8px;color:var(--text3);}

/* No chat selected */
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.4;}
.no-chat-text{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:1px;}

/* Modal nuevo chat */
.new-chat-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;}
.new-chat-modal.open{display:flex;}
.new-chat-box{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:28px;width:360px;}
.new-chat-box h3{font-family:var(--fd);font-size:22px;letter-spacing:1.5px;margin-bottom:20px;color:var(--text);}
</style>
</head>
<body>
<div class="agente-root">
  <!-- OPS sidebar inyectado por ops-nav.js -->

  <!-- Sidebar chats -->
  <div class="chats-sidebar">
    <div class="chats-top">
      <div class="chats-top-row">
        <span class="chats-title">CHATS</span>
        <button class="chats-new" onclick="openNewChat()" title="Nuevo chat">+</button>
      </div>
      <input class="chats-search" id="chatSearch" placeholder="Buscar chat…" oninput="filterChats()">
    </div>
    <div class="chats-list" id="chatsList">
      <div class="chats-empty">
        <div class="chats-empty-icon">💬</div>
        <div class="chats-empty-text">Cargando chats…</div>
      </div>
    </div>
  </div>

  <!-- Área de chat -->
  <div class="chat-area" id="chatArea">
    <div class="no-chat" id="noChatMsg">
      <div style="font-size:40px;">🤖</div>
      <div class="no-chat-text">Seleccioná un chat o creá uno nuevo</div>
    </div>
  </div>
</div>

<!-- Modal nuevo chat -->
<div class="new-chat-modal" id="newChatModal">
  <div class="new-chat-box">
    <h3>Nuevo chat</h3>
    <div class="ops-field">
      <label class="ops-label">Nombre</label>
      <input class="ops-input" id="newChatNombre" placeholder="Ej: Estrategia Q3, Análisis Floremané…" maxlength="100">
    </div>
    <div class="ops-field">
      <label class="ops-label">Tipo</label>
      <select class="ops-input" id="newChatTipo">
        <option value="libre">🟤 Libre — consulta general</option>
        <option value="proyecto">🟣 Proyecto — contexto de un proyecto</option>
        <option value="lead">🟠 Lead — contexto de un cliente</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-primary" onclick="createChat()" style="flex:1;justify-content:center;">Crear chat</button>
      <button class="btn btn-ghost" onclick="closeNewChat()">Cancelar</button>
    </div>
  </div>
</div>

<script src="/OPS/shared/ops-auth.js"></script>
<script src="/OPS/shared/ops-nav.js"></script>
<script>
const HINTS = {
  socio:[
    {t:'Pipeline',d:'¿Cuánto vale el pipeline actual en CLP?'},
    {t:'MRR',d:'¿Cuánto podría sumar si cierro los arranques?'},
    {t:'Prioridades',d:'¿En qué debería enfocarme esta semana?'},
    {t:'Análisis',d:'¿Qué lead tiene más chances de cerrar?'},
  ],
  tecnico:[
    {t:'Arquitectura',d:'¿Qué riesgos ves en el stack actual?'},
    {t:'Prioridades',d:'¿Qué queda pendiente en el proyecto activo?'},
    {t:'Deploy',d:'¿Qué checklist necesito para subir a producción?'},
    {t:'Automatización',d:'¿Cómo automatizaría este flujo con n8n?'},
  ],
};

let allChats=[], activeChat=null, modo='socio';

/* ─── Sidebar chats ─── */
async function loadChats(){
  const sb=getSB();
  const {data}=await sb.from('chats').select('id,nombre,tipo,messages,updated_at').order('updated_at',{ascending:false});
  allChats=data||[];
  renderChatList(allChats);
}

function renderChatList(chats){
  const el=document.getElementById('chatsList');
  if(!chats.length){
    el.innerHTML=`<div class="chats-empty"><div class="chats-empty-icon">💬</div><div class="chats-empty-text">Sin chats aún</div></div>`;
    return;
  }
  el.innerHTML=chats.map(c=>{
    const msgs=Array.isArray(c.messages)?c.messages:[];
    const last=msgs[msgs.length-1];
    const preview=last?last.content.substring(0,40)+'…':'Sin mensajes';
    const tipoMap={libre:'tipo-libre',proyecto:'tipo-proyecto',lead:'tipo-lead'};
    return `<div class="chat-item${c.id===activeChat?.id?' active':''}" onclick="openChat('${c.id}')">
      <button class="chat-item-del" onclick="event.stopPropagation();deleteChat('${c.id}')">×</button>
      <div class="chat-item-name">${c.nombre}</div>
      <div class="chat-item-preview">${preview}</div>
      <div class="chat-tipo ${tipoMap[c.tipo]||'tipo-libre'}">${c.tipo}</div>
      <div class="chat-item-date">${new Date(c.updated_at).toLocaleDateString('es-CL',{day:'numeric',month:'short'})}</div>
    </div>`;
  }).join('');
}

function filterChats(){
  const q=document.getElementById('chatSearch').value.toLowerCase();
  renderChatList(allChats.filter(c=>c.nombre.toLowerCase().includes(q)));
}

async function openChat(id){
  activeChat=allChats.find(c=>c.id===id);
  if(!activeChat) return;
  renderChatList(allChats);
  renderChatArea();
}

async function deleteChat(id){
  if(!confirm('¿Eliminar este chat?')) return;
  const sb=getSB();
  await sb.from('chats').delete().eq('id',id);
  if(activeChat?.id===id){activeChat=null;document.getElementById('chatArea').innerHTML=noChatHTML();}
  allChats=allChats.filter(c=>c.id!==id);
  renderChatList(allChats);
  opsToast('Chat eliminado');
}

function noChatHTML(){return `<div class="no-chat" id="noChatMsg"><div style="font-size:40px;">🤖</div><div class="no-chat-text">Seleccioná un chat o creá uno nuevo</div></div>`;}

/* ─── Área de chat ─── */
function renderChatArea(){
  const area=document.getElementById('chatArea');
  area.innerHTML=`
    <div class="mode-bar">
      <div contenteditable="true" class="chat-area-title" id="chatTitle" onblur="saveTitle(this.textContent)">${activeChat.nombre}</div>
      <div class="mode-toggle">
        <button class="mode-btn active socio" id="btnSocio" onclick="setModo('socio')">💼 Socio</button>
        <button class="mode-btn tecnico" id="btnTecnico" onclick="setModo('tecnico')">⚙️ Técnico</button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Escribí tu consulta…" rows="1"
          onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
        <button class="chat-send" id="btnSend" onclick="send()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="chat-meta">
        <span id="chatMetaInfo">Modo ${modo} · ${(Array.isArray(activeChat.messages)?activeChat.messages.length:0)} mensajes</span>
        <button onclick="clearMessages()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--fm);font-size:8px;letter-spacing:.5px;">✕ Limpiar</button>
      </div>
    </div>`;

  const msgs=Array.isArray(activeChat.messages)?activeChat.messages:[];
  if(msgs.length) renderMessages(msgs);
  else renderWelcome();
}

function renderWelcome(){
  const el=document.getElementById('chatMessages');
  el.innerHTML=`<div class="chat-welcome">
    <div class="chat-welcome-icon">🤖</div>
    <div class="chat-welcome-title">Agente HORIZON</div>
    <div class="chat-hints">${HINTS[modo].map(h=>`<button class="chat-hint" onclick="sendDirect('${h.d.replace(/'/g,"\\'")}')"><strong>${h.t}</strong>${h.d}</button>`).join('')}</div>
  </div>`;
}

function renderMessages(msgs){
  const el=document.getElementById('chatMessages');
  el.innerHTML=msgs.map(m=>{
    const isUser=m.role==='user';
    const av=isUser?'👤':'🤖';
    const fmt=isUser?escHtml(m.content):mdToHtml(m.content);
    const ts=m.ts?new Date(m.ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="msg ${isUser?'user':'agente'}">
      <div class="msg-avatar">${av}</div>
      <div><div class="msg-bubble">${isUser?fmt:'<p>'+fmt+'</p>'}</div><span class="msg-time">${ts}</span></div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdToHtml(s){
  return String(s||'')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function setModo(m){
  modo=m;
  document.getElementById('btnSocio')?.classList.toggle('active',m==='socio');
  document.getElementById('btnTecnico')?.classList.toggle('active',m==='tecnico');
  document.getElementById('btnSocio')?.classList.toggle('socio',m==='socio');
  document.getElementById('btnTecnico')?.classList.toggle('tecnico',m==='tecnico');
  const msgs=Array.isArray(activeChat?.messages)?activeChat.messages:[];
  if(!msgs.length) renderWelcome();
}

function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function sendDirect(t){ document.getElementById('chatInput').value=t; send(); }

async function send(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim(); if(!msg||!activeChat) return;
  input.value=''; input.style.height='auto';
  document.getElementById('btnSend').disabled=true;

  const msgs=Array.isArray(activeChat.messages)?[...activeChat.messages]:[];
  const userMsg={role:'user',content:msg,ts:new Date().toISOString()};
  msgs.push(userMsg);
  activeChat.messages=msgs;
  renderMessages(msgs);

  // Typing indicator
  const tid='typing-'+Date.now();
  const el=document.getElementById('chatMessages');
  el.insertAdjacentHTML('beforeend',`<div id="${tid}" class="msg agente"><div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`);
  el.scrollTop=el.scrollHeight;

  try{
    const headers=await opsAuthHeaders();
    const r=await fetch('/api/ops/agente',{method:'POST',headers,
      body:JSON.stringify({modo,mensaje:msg,historial:msgs.slice(-12).slice(0,-1)})});
    const data=await r.json();
    document.getElementById(tid)?.remove();
    const reply={role:'agente',content:data.respuesta||data.error||'Error.',ts:new Date().toISOString()};
    msgs.push(reply);
    activeChat.messages=msgs;
    renderMessages(msgs);
    // Persistir en Supabase
    const sb=getSB();
    await sb.from('chats').update({messages:msgs,nombre:activeChat.nombre}).eq('id',activeChat.id);
    const idx=allChats.findIndex(c=>c.id===activeChat.id);
    if(idx>=0) allChats[idx].messages=msgs;
    document.getElementById('chatMetaInfo').textContent=`Modo ${modo} · ${msgs.length} mensajes`;
  }catch(e){
    document.getElementById(tid)?.remove();
    const errMsg={role:'agente',content:'Error de conexión. Verificá que el servidor esté corriendo.',ts:new Date().toISOString()};
    msgs.push(errMsg); activeChat.messages=msgs; renderMessages(msgs);
  }finally{ document.getElementById('btnSend').disabled=false; }
}

async function clearMessages(){
  if(!activeChat||!confirm('¿Limpiar el historial de este chat?')) return;
  activeChat.messages=[];
  const sb=getSB();
  await sb.from('chats').update({messages:[]}).eq('id',activeChat.id);
  renderWelcome();
  opsToast('Historial limpiado');
}

async function saveTitle(t){
  if(!activeChat||!t.trim()) return;
  activeChat.nombre=t.trim();
  const sb=getSB();
  await sb.from('chats').update({nombre:t.trim()}).eq('id',activeChat.id);
  const idx=allChats.findIndex(c=>c.id===activeChat.id);
  if(idx>=0) allChats[idx].nombre=t.trim();
  renderChatList(allChats);
}

/* ─── Modal nuevo chat ─── */
function openNewChat(){ document.getElementById('newChatNombre').value=''; document.getElementById('newChatModal').classList.add('open'); setTimeout(()=>document.getElementById('newChatNombre').focus(),100); }
function closeNewChat(){ document.getElementById('newChatModal').classList.remove('open'); }

async function createChat(){
  const nombre=document.getElementById('newChatNombre').value.trim()||'Chat nuevo';
  const tipo=document.getElementById('newChatTipo').value;
  const sb=getSB();
  const {data}=await sb.from('chats').insert({nombre,tipo,messages:[]}).select().single();
  closeNewChat();
  allChats.unshift(data);
  renderChatList(allChats);
  await openChat(data.id);
  opsToast('Chat creado');
}

(async function(){
  const session=await opsRequireAuth(); if(!session)return;
  await opsInitNav();
  await loadChats();
})();
