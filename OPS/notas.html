<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>HORIZON OPS · Notas</title>
<link rel="icon" type="image/png" href="../Identidad/Logo ISO.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="/OPS/shared/ops.css">
<style>
/* Toolbar */
.notas-toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.notas-search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:var(--fb);font-size:13px;padding:9px 14px;outline:none;}
.notas-search:focus{border-color:var(--h1);}
.color-filters{display:flex;gap:5px;align-items:center;}
.cf-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0;}
.cf-dot:hover{transform:scale(1.15);}
.cf-dot.active{border-color:var(--text);}
.view-toggle{display:flex;gap:2px;background:var(--card2);border-radius:7px;padding:3px;}
.vt-btn{padding:6px 12px;border-radius:5px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;transition:.15s;}
.vt-btn.active{background:var(--card);color:var(--text);}

/* Grid post-its */
.notas-grid{columns:280px auto;gap:12px;column-fill:balance;}
.notas-list{display:flex;flex-direction:column;gap:8px;}

/* Post-it card */
.nota-card{
  break-inside:avoid;margin-bottom:12px;
  border-radius:12px;padding:16px;cursor:pointer;transition:.15s;
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
}
.notas-list .nota-card{margin-bottom:0;border-radius:10px;}
.nota-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.nota-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.nota-card-titulo{font-size:14px;font-weight:600;color:rgba(0,0,0,.8);margin-bottom:8px;line-height:1.3;}
.nota-card-contenido{font-size:12px;color:rgba(0,0,0,.65);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.nota-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.nota-card-date{font-family:var(--fm);font-size:8px;color:rgba(0,0,0,.45);letter-spacing:.5px;}
.nota-card-actions{display:flex;gap:4px;opacity:0;transition:.15s;}
.nota-card:hover .nota-card-actions{opacity:1;}
.na-btn{background:rgba(0,0,0,.12);border:none;border-radius:4px;color:rgba(0,0,0,.6);cursor:pointer;padding:3px 7px;font-size:11px;transition:.15s;}
.na-btn:hover{background:rgba(0,0,0,.2);}

/* Color schemes */
.nc-amarillo{background:#f9e784;} .nc-amarillo::before{background:#e6c200;}
.nc-coral{background:#ff8a75;} .nc-coral::before{background:#cc4a35;}
.nc-verde{background:#8de0a3;} .nc-verde::before{background:#3aa857;}
.nc-azul{background:#78ceff;} .nc-azul::before{background:#1a7fd4;}
.nc-violeta{background:#c29cf7;} .nc-violeta::before{background:#7c3aed;}
.nc-rosa{background:#f9a8d4;} .nc-rosa::before{background:#db2777;}
.nc-gris{background:#d1d5db;} .nc-gris::before{background:#6b7280;}
.nc-naranja{background:#fed7aa;} .nc-naranja::before{background:#ea580c;}
.nc-default{background:#1c1a2e;color:var(--text);} .nc-default::before{background:var(--h1);}
.nc-default .nota-card-titulo,.nc-default .nota-card-contenido{color:var(--text2);}
.nc-default .nota-card-date{color:var(--text3);}
.nc-default .na-btn{background:rgba(255,255,255,.08);color:var(--text2);}

/* Modal editor */
.nota-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;}
.nota-modal-bg.open{display:flex;}
.nota-modal{width:100%;max-width:520px;border-radius:16px;padding:0;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.nota-modal-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(0,0,0,.1);}
.nm-titulo{flex:1;background:none;border:none;outline:none;font-size:16px;font-weight:700;color:inherit;}
.nota-modal-body{padding:16px 18px;}
.nm-contenido{width:100%;background:none;border:none;outline:none;font-family:var(--fb);font-size:14px;line-height:1.7;resize:none;min-height:160px;color:inherit;}
.nota-modal-footer{padding:12px 18px;border-top:1px solid rgba(0,0,0,.1);display:flex;align-items:center;gap:8px;}
.color-picker-row{display:flex;gap:6px;flex:1;align-items:center;flex-wrap:wrap;}
.cp-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;}
.cp-dot:hover{transform:scale(1.1);}
.cp-dot.selected{border-color:rgba(0,0,0,.4);transform:scale(1.1);}
</style>
</head>
<body>
<div class="ops-layout">
  <main class="ops-main">
    <div class="ops-header">
      <div><div class="ops-page-title">Notas</div><div class="ops-page-sub" id="notasSub">Board de ideas y notas</div></div>
      <div class="ops-header-actions">
        <button class="btn btn-primary btn-sm" onclick="openNew()">+ Nueva nota</button>
      </div>
    </div>
    <div class="ops-content">
      <div class="notas-toolbar">
        <input class="notas-search" id="notaSearch" placeholder="🔍 Buscar notas…" oninput="render()">
        <div class="color-filters" id="colorFilters">
          <span style="font-family:var(--fm);font-size:8px;color:var(--text3);letter-spacing:1px;margin-right:2px;">COLOR:</span>
          <div class="cf-dot active" style="background:var(--border2);border:1px solid var(--border3);" onclick="setColorFilter('',this)" title="Todas"></div>
          <div class="cf-dot" style="background:#f9e784;" onclick="setColorFilter('amarillo',this)"></div>
          <div class="cf-dot" style="background:#ff8a75;" onclick="setColorFilter('coral',this)"></div>
          <div class="cf-dot" style="background:#8de0a3;" onclick="setColorFilter('verde',this)"></div>
          <div class="cf-dot" style="background:#78ceff;" onclick="setColorFilter('azul',this)"></div>
          <div class="cf-dot" style="background:#c29cf7;" onclick="setColorFilter('violeta',this)"></div>
          <div class="cf-dot" style="background:#f9a8d4;" onclick="setColorFilter('rosa',this)"></div>
          <div class="cf-dot" style="background:#1c1a2e;border:1px solid var(--border2);" onclick="setColorFilter('default',this)"></div>
        </div>
        <div class="view-toggle">
          <button class="vt-btn active" id="vGrid" onclick="setView('grid',this)" title="Grid">⊞</button>
          <button class="vt-btn" id="vList" onclick="setView('list',this)" title="Lista">☰</button>
        </div>
      </div>
      <div id="notasLoading" class="ops-loading"><div class="ops-spinner"></div></div>
      <div id="notasContainer" style="display:none;"></div>
    </div>
  </main>
</div>

<!-- Modal editor -->
<div class="nota-modal-bg" id="notaModal">
  <div class="nota-modal" id="notaModalBox">
    <div class="nota-modal-header" id="notaModalHeader">
      <input class="nm-titulo" id="nmTitulo" placeholder="Título…" maxlength="200" oninput="schedSave()">
    </div>
    <div class="nota-modal-body">
      <textarea class="nm-contenido" id="nmContenido" placeholder="Escribí lo que quieras…" oninput="schedSave()"></textarea>
    </div>
    <div class="nota-modal-footer">
      <div class="color-picker-row" id="colorPicker"></div>
      <div style="display:flex;gap:6px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" onclick="deleteNota()">🗑</button>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script src="/OPS/shared/ops-auth.js"></script>
<script src="/OPS/shared/ops-nav.js"></script>
<script>
const COLORS=['amarillo','coral','verde','azul','violeta','rosa','naranja','gris','default'];
const COLOR_BG={amarillo:'#f9e784',coral:'#ff8a75',verde:'#8de0a3',azul:'#78ceff',violeta:'#c29cf7',rosa:'#f9a8d4',naranja:'#fed7aa',gris:'#d1d5db',default:'#1c1a2e'};
let allNotas=[], activeColor='', viewMode='grid', editId=null, saveTimer=null;

async function load(){
  const sb=getSB();
  const {data}=await sb.from('notas').select('*').order('updated_at',{ascending:false});
  allNotas=data||[];
  document.getElementById('notasLoading').style.display='none';
  document.getElementById('notasContainer').style.display='block';
  render();
}

function getFiltered(){
  let n=allNotas;
  const q=document.getElementById('notaSearch').value.toLowerCase();
  if(q) n=n.filter(x=>(x.titulo||'').toLowerCase().includes(q)||(x.contenido||'').toLowerCase().includes(q));
  if(activeColor) n=n.filter(x=>(x.color||'default')===activeColor);
  return n;
}

function setColorFilter(c,btn){
  activeColor=c;
  document.querySelectorAll('.cf-dot').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setView(v,btn){ viewMode=v; document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

function render(){
  const filtered=getFiltered();
  document.getElementById('notasSub').textContent=`${filtered.length} nota${filtered.length!==1?'s':''} · ${viewMode==='grid'?'Grid':'Lista'}`;
  const container=document.getElementById('notasContainer');

  if(!filtered.length){
    container.innerHTML=`<div class="ops-empty"><div class="ops-empty-icon">📝</div><div class="ops-empty-text">${activeColor||document.getElementById('notaSearch').value?'Sin notas con ese filtro':'Sin notas aún'}</div><button class="btn btn-primary" onclick="openNew()" style="margin-top:12px;">+ Crear nota</button></div>`;
    return;
  }

  const cls=viewMode==='grid'?'notas-grid':'notas-list';
  container.innerHTML=`<div class="${cls}">${filtered.map(n=>renderCard(n)).join('')}</div>`;
}

function renderCard(n){
  const color=n.color||'default';
  const titulo=n.titulo||'Sin título';
  const contenido=(n.contenido||'').substring(0,200);
  const date=new Date(n.updated_at||n.created_at).toLocaleDateString('es-CL',{day:'numeric',month:'short'});
  return `<div class="nota-card nc-${color}" onclick="openEdit('${n.id}')">
    <div class="nota-card-titulo">${escHtml(titulo)}</div>
    ${contenido?`<div class="nota-card-contenido">${escHtml(contenido)}${(n.contenido||'').length>200?'…':''}</div>`:''}
    <div class="nota-card-meta">
      <span class="nota-card-date">${date}</span>
      <div class="nota-card-actions" onclick="event.stopPropagation()">
        <button class="na-btn" onclick="duplicateNota('${n.id}')">⎘</button>
        <button class="na-btn" onclick="openEdit('${n.id}')">✏️</button>
        <button class="na-btn" onclick="deleteNotaById('${n.id}')">🗑</button>
      </div>
    </div>
  </div>`;
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* Modal */
function buildColorPicker(current){
  return COLORS.map(c=>`<div class="cp-dot ${c===current?'selected':''}" style="background:${COLOR_BG[c]};border:${c==='default'?'1px solid rgba(255,255,255,.15)':'none'};" onclick="pickColor('${c}')"></div>`).join('');
}

function applyModalColor(color){
  const box=document.getElementById('notaModalBox');
  box.className='nota-modal nc-'+color;
  box.style.boxShadow=`0 20px 60px rgba(0,0,0,.4)`;
  document.getElementById('colorPicker').innerHTML=buildColorPicker(color);
}

function openNew(){
  editId=null; clearTimeout(saveTimer);
  document.getElementById('nmTitulo').value='';
  document.getElementById('nmContenido').value='';
  applyModalColor('amarillo');
  document.getElementById('notaModal').classList.add('open');
  setTimeout(()=>document.getElementById('nmTitulo').focus(),100);
}

function openEdit(id){
  const n=allNotas.find(x=>x.id===id); if(!n)return;
  editId=id; clearTimeout(saveTimer);
  document.getElementById('nmTitulo').value=n.titulo||'';
  document.getElementById('nmContenido').value=n.contenido||'';
  applyModalColor(n.color||'default');
  document.getElementById('notaModal').classList.add('open');
}

function closeModal(){ clearTimeout(saveTimer); document.getElementById('notaModal').classList.remove('open'); }

function pickColor(c){
  applyModalColor(c);
  // Save color immediately
  schedSave();
}

function getCurrentColor(){
  const box=document.getElementById('notaModalBox');
  for(const c of COLORS){ if(box.classList.contains('nc-'+c)) return c; }
  return 'default';
}

function schedSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveNota,1000);
}

async function saveNota(){
  const titulo=document.getElementById('nmTitulo').value||'Sin título';
  const contenido=document.getElementById('nmContenido').value;
  const color=getCurrentColor();
  const sb=getSB();
  if(editId){
    await sb.from('notas').update({titulo,contenido,color}).eq('id',editId);
    const idx=allNotas.findIndex(n=>n.id===editId);
    if(idx>=0) allNotas[idx]={...allNotas[idx],titulo,contenido,color,updated_at:new Date().toISOString()};
  } else {
    const {data}=await sb.from('notas').insert({titulo,contenido,color}).select().single();
    editId=data.id; allNotas.unshift(data);
  }
  render();
}

async function deleteNota(){
  if(!editId){closeModal();return;}
  if(!confirm('¿Eliminar esta nota?'))return;
  const sb=getSB();
  await sb.from('notas').delete().eq('id',editId);
  allNotas=allNotas.filter(n=>n.id!==editId);
  editId=null; closeModal(); render(); opsToast('Nota eliminada');
}

async function deleteNotaById(id){
  if(!confirm('¿Eliminar?'))return;
  const sb=getSB(); await sb.from('notas').delete().eq('id',id);
  allNotas=allNotas.filter(n=>n.id!==id); render();
}

async function duplicateNota(id){
  const n=allNotas.find(x=>x.id===id); if(!n)return;
  const sb=getSB();
  const {data}=await sb.from('notas').insert({titulo:n.titulo+' (copia)',contenido:n.contenido,color:n.color}).select().single();
  allNotas.unshift(data); render(); opsToast('Nota duplicada');
}

(async function(){ const session=await opsRequireAuth(); if(!session)return; await opsInitNav(); await load(); })();
</script>
</body>
</html>
