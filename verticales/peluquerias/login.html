<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — HORIZON SaaS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../_core/saas-config.js"></script>
  <script src="../_core/saas-auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #444; }
    button {
      width: 100%;
      padding: 11px;
      background: #c8940a;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #e0a80c; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .error {
      margin-top: 16px;
      padding: 10px 14px;
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">HORIZON SaaS</div>
    <h1>Iniciar sesión</h1>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      <button type="submit" id="btn">Entrar</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script>
    // Si ya hay sesión, redirigir directamente
    (async () => {
      const session = await getSession();
      if (session) redirectByRole();
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      errorEl.classList.remove('show');

      try {
        await login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        await redirectByRole();
      } catch (err) {
        errorEl.textContent = err.message === 'Invalid login credentials'
          ? 'Email o contraseña incorrectos.'
          : err.message;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
