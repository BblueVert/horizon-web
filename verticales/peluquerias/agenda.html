<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — HORIZON SaaS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../_core/saas-config.js"></script>
  <script src="../_core/saas-auth.js"></script>
  <script src="../_core/saas-nav.js"></script>
  <link rel="stylesheet" href="../_core/saas.css">
  <style>
    /* ── Layout ── */
    body { overflow: hidden; }
    .agenda-root { display: flex; height: calc(100vh - 0px); margin-left: var(--nav-w); }

    /* ── Sidebar izquierda ── */
    .ag-sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 14px; gap: 14px; }
    .ag-sidebar::-webkit-scrollbar { width: 3px; }
    .ag-sidebar::-webkit-scrollbar-thumb { background: var(--border2); }

    .share-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; }
    .share-box-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .share-link-row { display: flex; align-items: center; gap: 6px; }
    .share-link-text { font-size: 10px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-family: monospace; }
    .copy-btn { flex-shrink: 0; padding: 4px 8px; background: var(--accent); color: #000; border: none; border-radius: 5px; font-size: 10px; font-weight: 700; cursor: pointer; }

    .sidebar-section { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }

    .pro-list { display: flex; flex-direction: column; gap: 4px; }
    .pro-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 7px; cursor: pointer; transition: background .12s; }
    .pro-item:hover { background: var(--surface2); }
    .pro-item.active { background: var(--accent-dim); }
    .pro-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .pro-name { font-size: 12px; color: var(--text2); font-weight: 500; }
    .pro-item.active .pro-name { color: var(--accent); font-weight: 700; }
    .pro-count { margin-left: auto; font-size: 10px; color: var(--text3); }

    .status-select { width: 100%; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text2); font-size: 12px; outline: none; cursor: pointer; }
    .status-select:focus { border-color: var(--accent); }

    /* ── Mini calendario ── */
    .mini-cal { }
    .mc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mc-month { font-size: 12px; font-weight: 700; color: var(--text); }
    .mc-nav { display: flex; gap: 2px; }
    .mc-nav button { width: 22px; height: 22px; border: none; background: none; color: var(--text2); cursor: pointer; border-radius: 4px; font-size: 12px; }
    .mc-nav button:hover { background: var(--surface2); }
    .mc-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .mc-dow { text-align: center; font-size: 9px; color: var(--text3); padding: 2px 0; font-weight: 600; }
    .mc-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 11px; color: var(--text2); cursor: pointer; transition: .1s; }
    .mc-day:hover { background: var(--surface2); }
    .mc-day.today { font-weight: 800; color: var(--accent); }
    .mc-day.selected { background: var(--accent); color: #000; font-weight: 700; }
    .mc-day.has-appt::after { content: ''; display: block; width: 3px; height: 3px; border-radius: 50%; background: var(--accent); position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); }
    .mc-day { position: relative; }
    .mc-day.other { opacity: .25; cursor: default; }

    /* ── Main area ── */
    .ag-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Toolbar ── */
    .ag-toolbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 16px; flex-shrink: 0; }
    .ag-toolbar-date { font-size: 14px; font-weight: 600; color: var(--text); }
    .ag-toolbar-sub { font-size: 11px; color: var(--text3); margin-left: 4px; }
    .ag-nav { display: flex; gap: 4px; }
    .ag-nav button { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: .12s; }
    .ag-nav button:hover { border-color: var(--accent); color: var(--accent); }
    .view-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
    .view-tab { padding: 5px 12px; background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; border: none; border-right: 1px solid var(--border); transition: .12s; }
    .view-tab:last-child { border-right: none; }
    .view-tab.active { background: var(--accent); color: #000; font-weight: 700; }
    .spacer { flex: 1; }
    .btn-nuevo { display: flex; align-items: center; gap: 6px; padding: 7px 16px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .12s; }
    .btn-nuevo:hover { background: var(--accent-light); }
    .refresh-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .refresh-btn:hover { border-color: var(--accent); }

    /* ── Calendar grid ── */
    .ag-grid-wrap { flex: 1; overflow: auto; }
    .ag-grid { display: grid; position: relative; min-width: 600px; }

    /* Columna de horas */
    .ag-time-col { width: 56px; flex-shrink: 0; }
    .ag-time-cell { height: 60px; display: flex; align-items: flex-start; padding: 3px 6px; border-bottom: 1px solid var(--border); }
    .ag-time-cell span { font-size: 9px; color: var(--text3); font-family: monospace; }

    /* Encabezado de día/barbero */
    .ag-col-head { background: var(--surface); border-bottom: 2px solid var(--border); padding: 8px 10px; position: sticky; top: 0; z-index: 10; }
    .ag-col-head.today-col { background: var(--accent-dim); }
    .ag-col-head-day { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
    .ag-col-head-date { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.1; }
    .ag-col-head.today-col .ag-col-head-date { color: var(--accent); }
    .ag-col-head-staff { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
    .ag-col-head-staff-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* Col de eventos */
    .ag-col-body { position: relative; }
    .ag-hour-row { height: 60px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
    .ag-hour-row:last-child { border-bottom: none; }

    /* Bloques de turno */
    .ag-block { position: absolute; left: 3px; right: 3px; border-radius: 7px; padding: 4px 7px; cursor: pointer; overflow: hidden; border-left: 3px solid transparent; transition: filter .12s, box-shadow .12s; z-index: 5; }
    .ag-block:hover { filter: brightness(1.1); box-shadow: 0 2px 10px rgba(0,0,0,.2); z-index: 10; }
    .ag-block-time { font-size: 9px; font-weight: 700; opacity: .8; }
    .ag-block-client { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ag-block-service { font-size: 10px; opacity: .75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ag-block-tag { font-size: 9px; margin-top: 2px; opacity: .7; }

    /* Línea "ahora" */
    .ag-now-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--danger); z-index: 20; pointer-events: none; }
    .ag-now-dot { position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--danger); }

    /* ── Detail drawer ── */
    .ag-detail-overlay { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
    .ag-detail-overlay.open { pointer-events: all; }
    .ag-detail-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); opacity: 0; transition: opacity .2s; }
    .ag-detail-overlay.open .ag-detail-backdrop { opacity: 1; }
    .ag-detail-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 340px; background: var(--surface); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); overflow-y: auto; display: flex; flex-direction: column; }
    .ag-detail-overlay.open .ag-detail-panel { transform: translateX(0); }
    .ag-detail-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; }
    .close-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; }
    .close-btn:hover { color: var(--text); }
    .ag-detail-body { flex: 1; overflow-y: auto; }
    .ag-detail-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .ag-detail-section-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; font-size: 12px; }
    .info-row .lbl { color: var(--text3); }
    .info-row .val { color: var(--text); font-weight: 500; text-align: right; max-width: 180px; }
    .visit-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .visit-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
    .visit-item:last-child { border-bottom: none; }
    .pref-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .pref-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    .ag-notes textarea { width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-size: 12px; resize: none; outline: none; font-family: inherit; line-height: 1.5; }
    .ag-notes textarea:focus { border-color: var(--accent); }
    .action-btns { display: flex; flex-direction: column; gap: 6px; padding: 14px 20px; }

    /* ── Nuevo turno modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(3px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; width: 100%; max-width: 440px; transform: scale(.96); transition: transform .2s; }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
<div style="display:flex;">
  <nav id="saas-nav"></nav>
  <div class="agenda-root">

    <!-- ── Sidebar ── -->
    <aside class="ag-sidebar">
      <!-- Share link -->
      <div class="share-box">
        <div class="share-box-title">📲 Link de reservas</div>
        <div class="share-link-row">
          <span class="share-link-text" id="shareLink">cargando...</span>
          <button class="copy-btn" onclick="copyLink()">Copiar</button>
        </div>
      </div>

      <!-- Profesionales -->
      <div class="sidebar-section">
        <div class="sidebar-label">Profesional</div>
        <div class="pro-list" id="proList"></div>
      </div>

      <!-- Estado -->
      <div class="sidebar-section">
        <div class="sidebar-label">Estado</div>
        <select class="status-select" id="statusFilter" onchange="renderCalendar()">
          <option value="">Todas las reservas</option>
          <option value="confirmed">Confirmadas</option>
          <option value="pending">Pendientes</option>
          <option value="completed">Completadas</option>
          <option value="cancelled">Canceladas</option>
          <option value="no_show">No-show</option>
        </select>
      </div>

      <!-- Mini calendario -->
      <div class="sidebar-section">
        <div class="sidebar-label">Calendario</div>
        <div class="mini-cal">
          <div class="mc-header">
            <span class="mc-month" id="mcMonth"></span>
            <div class="mc-nav">
              <button onclick="mcPrev()">‹</button>
              <button onclick="mcNext()">›</button>
            </div>
          </div>
          <div class="mc-grid" id="mcGrid"></div>
        </div>
      </div>

      <!-- Búsqueda rápida -->
      <button class="btn btn-ghost" style="width:100%;font-size:12px;justify-content:center;" onclick="goToday()">
        📅 Ir a hoy
      </button>
    </aside>

    <!-- ── Main ── -->
    <div class="ag-main">
      <!-- Toolbar -->
      <div class="ag-toolbar">
        <div class="ag-nav">
          <button onclick="navPrev()">‹</button>
          <button onclick="navNext()">›</button>
        </div>
        <span class="ag-toolbar-date" id="toolbarDate">—</span>
        <div class="view-tabs">
          <button class="view-tab active" id="viewDay"  onclick="setView('day')">Día</button>
          <button class="view-tab"        id="viewWeek" onclick="setView('week')">Semana</button>
        </div>
        <span class="spacer"></span>
        <button class="refresh-btn" onclick="renderCalendar()" title="Actualizar">↻</button>
        <button class="btn-nuevo" onclick="openNuevo()">+ Nuevo turno</button>
      </div>

      <!-- Grid -->
      <div class="ag-grid-wrap" id="gridWrap">
        <div class="loading" style="padding:40px;text-align:center;color:var(--text3);">
          <div class="spinner"></div>Cargando agenda...
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Detail panel ── -->
<div class="ag-detail-overlay" id="detailOverlay">
  <div class="ag-detail-backdrop" onclick="closeDetail()"></div>
  <div class="ag-detail-panel" id="detailPanel"></div>
</div>

<!-- ── Modal nuevo turno ── -->
<div class="modal-overlay" id="nuevoModal" onclick="if(event.target===this)closeNuevo()">
  <div class="modal-box">
    <div class="modal-title">➕ Nuevo turno</div>
    <form id="nuevoForm" onsubmit="saveNuevo(event)">
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input class="form-input" id="nDate" type="date" required>
        </div>
        <div class="form-group">
          <label class="form-label">Hora</label>
          <input class="form-input" id="nTime" type="time" required>
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Barbero</label>
          <select class="form-input" id="nStaff" required></select>
        </div>
        <div class="form-group">
          <label class="form-label">Servicio</label>
          <select class="form-input" id="nService" required></select>
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Nombre cliente</label>
          <input class="form-input" id="nName" placeholder="Juan Pérez" required>
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp</label>
          <input class="form-input" id="nPhone" type="tel" placeholder="+56912345678" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <input class="form-input" id="nNotes" placeholder="Preferencias, observaciones...">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
        <button type="button" class="btn btn-ghost" onclick="closeNuevo()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnNuevo">Crear turno</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
const sb = supabase.createClient(SAAS_CONFIG.supabase.url, SAAS_CONFIG.supabase.anonKey);

let _tid, _staff=[], _services=[], _view='day', _date=new Date();
_date.setHours(0,0,0,0);
let _filterStaffId=null, _mcYear=new Date().getFullYear(), _mcMonth=new Date().getMonth();

const HOURS  = Array.from({length:13},(_,i)=>i+8);
const MONTHS = ['Enero','Feb','Mar','Abr','Mayo','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DAYS_S = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_L = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const STATUS_LABEL = { pending:'Pendiente', confirmed:'Confirmada', completed:'Completada', cancelled:'Cancelada', no_show:'No vino' };
const STATUS_COLOR = { confirmed:'badge-green', pending:'badge-yellow', completed:'badge-gray', cancelled:'badge-red', no_show:'badge-red' };

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function formatCLP(n){ return '$'+Number(n).toLocaleString('es-CL'); }
function hexToRgba(h,a){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

// ── Navegación ────────────────────────────────────────────────────────────────
window.navPrev=function(){ _date=new Date(_date); _date.setDate(_date.getDate()+(_view==='week'?-7:-1)); updateToolbar(); renderCalendar(); };
window.navNext=function(){ _date=new Date(_date); _date.setDate(_date.getDate()+(_view==='week'?7:1)); updateToolbar(); renderCalendar(); };
window.goToday=function(){ _date=new Date(); _date.setHours(0,0,0,0); _mcYear=_date.getFullYear(); _mcMonth=_date.getMonth(); updateToolbar(); renderCalendar(); renderMiniCal(); };
window.setView=function(v){ _view=v; document.getElementById('viewDay').classList.toggle('active',v==='day'); document.getElementById('viewWeek').classList.toggle('active',v==='week'); updateToolbar(); renderCalendar(); };
window.copyLink=function(){ navigator.clipboard.writeText(document.getElementById('shareLink').textContent); showToast('✓ Link copiado'); };

function updateToolbar() {
  const el = document.getElementById('toolbarDate');
  if (_view==='day') {
    el.textContent = _date.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
  } else {
    const end=new Date(_date); end.setDate(end.getDate()+6);
    el.textContent = `${_date.toLocaleDateString('es-CL',{day:'numeric',month:'short'})} – ${end.toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'numeric'})}`;
  }
}

// ── Sidebar profesionales ─────────────────────────────────────────────────────
function renderProList(apptsByStaff={}) {
  document.getElementById('proList').innerHTML = [
    { id:null, name:'Todos', color:'#888', icon:'👥' },
    ..._staff
  ].map(s=>{
    const active = s.id===null ? _filterStaffId===null : _filterStaffId===s.id;
    const count  = s.id ? (apptsByStaff[s.id]||0) : Object.values(apptsByStaff).reduce((a,b)=>a+b,0);
    return `<div class="pro-item ${active?'active':''}" onclick="filterPro('${s.id}')">
      <div class="pro-dot" style="background:${s.color||'#888'}"></div>
      <span class="pro-name">${s.icon||''} ${s.name}</span>
      ${count?`<span class="pro-count">${count}</span>`:''}
    </div>`;
  }).join('');
}

window.filterPro=function(id){ _filterStaffId = id==='null'?null:id; renderProList(); renderCalendar(); };

// ── Mini calendario ───────────────────────────────────────────────────────────
window.mcPrev=function(){ if(--_mcMonth<0){_mcMonth=11;_mcYear--;} renderMiniCal(); };
window.mcNext=function(){ if(++_mcMonth>11){_mcMonth=0;_mcYear++;} renderMiniCal(); };

function renderMiniCal() {
  document.getElementById('mcMonth').textContent=`${MONTHS[_mcMonth]} ${_mcYear}`;
  const first=new Date(_mcYear,_mcMonth,1), nDays=new Date(_mcYear,_mcMonth+1,0).getDate();
  const startDow=(first.getDay()+6)%7;
  const today=new Date(); today.setHours(0,0,0,0);
  let html=['Lu','Ma','Mi','Ju','Vi','Sá','Do'].map(d=>`<div class="mc-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) html+=`<div class="mc-day other"></div>`;
  for(let d=1;d<=nDays;d++){
    const dt=new Date(_mcYear,_mcMonth,d);
    const sel=dt.toDateString()===_date.toDateString();
    const isToday=dt.toDateString()===today.toDateString();
    html+=`<div class="mc-day${isToday?' today':''}${sel?' selected':''}" onclick="mcPickDay(${_mcYear},${_mcMonth},${d})">${d}</div>`;
  }
  document.getElementById('mcGrid').innerHTML=html;
}

window.mcPickDay=function(y,m,d){ _date=new Date(y,m,d); _view='day'; document.getElementById('viewDay').classList.add('active'); document.getElementById('viewWeek').classList.remove('active'); updateToolbar(); renderCalendar(); renderMiniCal(); };

// ── Fetch & render calendario ─────────────────────────────────────────────────
async function renderCalendar() {
  const statusFilter = document.getElementById('statusFilter')?.value||'';
  let start, end;

  if (_view==='day') {
    start=new Date(_date); start.setHours(0,0,0,0);
    end  =new Date(_date); end.setHours(23,59,59,999);
  } else {
    // Semana: lunes de la semana actual
    const dow=(_date.getDay()+6)%7;
    start=new Date(_date); start.setDate(_date.getDate()-dow); start.setHours(0,0,0,0);
    end  =new Date(start);  end.setDate(start.getDate()+6); end.setHours(23,59,59,999);
  }

  let q=sb.from('biz_appointments')
    .select('*, biz_staff(id,name,color,icon), biz_services(name,duration_min), biz_clients(id,name,notes)')
    .eq('tenant_id',_tid)
    .gte('starts_at',start.toISOString())
    .lte('starts_at',end.toISOString())
    .order('starts_at');

  if (_filterStaffId) q=q.eq('staff_id',_filterStaffId);
  if (statusFilter)   q=q.eq('status',statusFilter);

  const {data:appts=[]} = await q;

  // Sidebar count
  const byStaff={};
  appts.forEach(a=>{ if(a.biz_staff?.id){ byStaff[a.biz_staff.id]=(byStaff[a.biz_staff.id]||0)+1; } });
  renderProList(byStaff);

  if (_view==='day') renderDay(start, appts);
  else               renderWeek(start, appts);
}

// ── Vista día: barberos como columnas ─────────────────────────────────────────
function renderDay(day, appts) {
  const visStaff = _filterStaffId ? _staff.filter(s=>s.id===_filterStaffId) : _staff;
  const gridCols = `56px ${visStaff.map(()=>'1fr').join(' ')}`;

  const headHTML = `<div style="height:0"></div>` +
    visStaff.map(s=>{
      const cnt=(appts||[]).filter(a=>a.biz_staff?.id===s.id).length;
      return `<div class="ag-col-head" style="border-top:3px solid ${s.color};">
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="font-size:14px;">${s.icon}</span>
          <span style="font-size:13px;font-weight:700;color:var(--text);">${s.name}</span>
          ${cnt?`<span style="font-size:10px;color:var(--text3);margin-left:auto;">${cnt} turnos</span>`:''}
        </div>
      </div>`;
    }).join('');

  const timeHTML = `<div class="ag-time-col">${HOURS.map(h=>`<div class="ag-time-cell"><span>${String(h).padStart(2,'0')}:00</span></div>`).join('')}</div>`;

  const colsHTML = visStaff.map(s=>{
    const sAppts = appts.filter(a=>a.biz_staff?.id===s.id);
    const blocks = sAppts.map(a=>buildBlock(a, day)).join('');
    const now = buildNowLine(day);
    return `<div class="ag-col-body" style="height:${HOURS.length*60}px;position:relative;">
      ${HOURS.map(()=>`<div class="ag-hour-row"></div>`).join('')}
      ${blocks}${now}
    </div>`;
  }).join('');

  document.getElementById('gridWrap').innerHTML = `
    <div style="display:grid;grid-template-columns:${gridCols};position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:2px solid var(--border);">
      <div style="border-right:1px solid var(--border);"></div>${headHTML}
    </div>
    <div style="display:flex;">
      ${timeHTML}
      <div style="flex:1;display:grid;grid-template-columns:${visStaff.map(()=>'1fr').join(' ')};">${colsHTML}</div>
    </div>`;
}

// ── Vista semana: días como columnas ──────────────────────────────────────────
function renderWeek(weekStart, appts) {
  const today=new Date(); today.setHours(0,0,0,0);
  const days=Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });
  const gridCols=`56px ${days.map(()=>'1fr').join(' ')}`;
  const visStaff = _filterStaffId ? _staff.filter(s=>s.id===_filterStaffId) : _staff;

  const headHTML = days.map(d=>{
    const isT=d.toDateString()===today.toDateString();
    const dow=DAYS_S[d.getDay()];
    return `<div class="ag-col-head ${isT?'today-col':''}">
      <div class="ag-col-head-day">${dow}</div>
      <div class="ag-col-head-date">${d.getDate()}</div>
    </div>`;
  }).join('');

  const timeHTML = `<div class="ag-time-col">${HOURS.map(h=>`<div class="ag-time-cell"><span>${String(h).padStart(2,'0')}:00</span></div>`).join('')}</div>`;

  const colsHTML = days.map(d=>{
    const dAppts = appts.filter(a=>{
      const at=new Date(a.starts_at); at.setHours(0,0,0,0);
      return at.toDateString()===d.toDateString();
    });
    const blocks = dAppts.map(a=>buildBlock(a,d)).join('');
    const now = buildNowLine(d);
    return `<div class="ag-col-body" style="height:${HOURS.length*60}px;position:relative;border-right:1px solid var(--border);">
      ${HOURS.map(()=>`<div class="ag-hour-row"></div>`).join('')}
      ${blocks}${now}
    </div>`;
  }).join('');

  document.getElementById('gridWrap').innerHTML = `
    <div style="display:grid;grid-template-columns:${gridCols};position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:2px solid var(--border);">
      <div style="border-right:1px solid var(--border);"></div>${headHTML}
    </div>
    <div style="display:flex;">
      ${timeHTML}
      <div style="flex:1;display:grid;grid-template-columns:${days.map(()=>'1fr').join(' ')};">${colsHTML}</div>
    </div>`;
}

function buildBlock(a, dayRef) {
  const start=new Date(a.starts_at);
  const dur=a.biz_services?.duration_min||30;
  const off=(start.getHours()-HOURS[0])*60+start.getMinutes();
  if(off<0||off>=HOURS.length*60) return '';
  const color = a.status==='cancelled'||a.status==='no_show' ? '#666' : (a.biz_staff?.color||'#888');
  const bg    = hexToRgba(color, a.status==='cancelled'||a.status==='no_show'?.4:.82);
  const ts    = `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
  const h     = Math.max(dur-2,20);
  const notes = a.notes ? '📝' : '';
  const returnBadge = ''; // se podría agregar un ● si es cliente recurrente

  return `<div class="ag-block" style="top:${off}px;height:${h}px;background:${bg};border-left-color:${color};color:#fff;"
    onclick='showDetail(${JSON.stringify(a).replace(/'/g,"\\'")})'>
    <div class="ag-block-time">${ts}</div>
    <div class="ag-block-client">${a.client_name} ${notes}</div>
    ${h>40?`<div class="ag-block-service">${a.biz_services?.name||''}</div>`:''}
    ${h>55&&a.biz_staff?.name?`<div class="ag-block-tag">${a.biz_staff.icon} ${a.biz_staff.name}</div>`:''}
  </div>`;
}

function buildNowLine(day) {
  const today=new Date(); today.setHours(0,0,0,0);
  if(day.toDateString()!==today.toDateString()) return '';
  const now=new Date();
  const off=(now.getHours()-HOURS[0])*60+now.getMinutes();
  if(off<0||off>HOURS.length*60) return '';
  return `<div class="ag-now-line" style="top:${off}px;"><div class="ag-now-dot"></div></div>`;
}

// ── Detail panel ──────────────────────────────────────────────────────────────
window.showDetail = async function(a) {
  const color=a.biz_staff?.color||'#888';
  const start=new Date(a.starts_at), end=new Date(a.ends_at);
  const ts=`${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
  const te=`${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`;

  // Cargar historial
  let visitHTML='', prefHTML='', visitCount=0;
  if(a.biz_clients?.id){
    const {data:visits=[]}=await sb.from('biz_appointments')
      .select('starts_at,status,biz_services(name)')
      .eq('tenant_id',_tid).eq('client_id',a.biz_clients.id)
      .neq('id',a.id).order('starts_at',{ascending:false}).limit(5);
    visitCount=visits.length;

    if(visits.length){
      visitHTML=`<div class="ag-detail-section">
        <div class="ag-detail-section-title">Historial · ${visitCount} visitas previas</div>
        ${visits.map(v=>{
          const d=new Date(v.starts_at).toLocaleDateString('es-CL',{day:'numeric',month:'short'});
          const sc=v.status==='completed'?'var(--success)':v.status==='no_show'?'var(--danger)':'var(--text3)';
          return `<div class="visit-item">
            <div style="width:6px;height:6px;border-radius:50%;background:${sc};flex-shrink:0;"></div>
            <span style="color:var(--text3);min-width:70px;font-size:11px;">${d}</span>
            <span style="color:var(--text2);flex:1;font-size:11px;">${v.biz_services?.name||'—'}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    const notes=(a.biz_clients.notes||'').trim();
    if(notes){
      const tags=notes.split(',').map(t=>t.trim()).filter(Boolean);
      prefHTML=`<div class="ag-detail-section">
        <div class="ag-detail-section-title">💡 Preferencias del cliente</div>
        <div class="pref-tags">${tags.map(t=>`<span class="pref-tag">${t}</span>`).join('')}</div>
      </div>`;
    }
  }

  const visitBadgeText = visitCount===0 ? 'Primera visita' : `${visitCount+1}ª visita`;
  const visitBadgeColor = visitCount===0 ? 'var(--accent)' : 'var(--success)';

  const statusActions=[];
  if(a.status==='confirmed'){ statusActions.push(`<button class="btn btn-primary" style="font-size:12px;padding:8px;" onclick="doStatus('${a.id}','completed')">✓ Completar turno</button>`); statusActions.push(`<button class="btn btn-ghost" style="font-size:12px;padding:8px;color:var(--danger);" onclick="doStatus('${a.id}','no_show')">No vino</button>`); }
  if(a.status==='pending') statusActions.push(`<button class="btn btn-primary" style="font-size:12px;padding:8px;" onclick="doStatus('${a.id}','confirmed')">Confirmar turno</button>`);
  if(!['completed','cancelled'].includes(a.status)) statusActions.push(`<button class="btn btn-ghost" style="font-size:12px;padding:8px;" onclick="doStatus('${a.id}','cancelled')">Cancelar reserva</button>`);

  document.getElementById('detailPanel').innerHTML=`
    <div class="ag-detail-header" style="border-top:3px solid ${color};">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:44px;height:44px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;">${initials(a.client_name)}</div>
        <div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:15px;font-weight:700;color:var(--text);">${a.client_name}</span>
            <span class="visit-badge" style="background:${visitBadgeColor}22;color:${visitBadgeColor};">${visitBadgeText}</span>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;">${a.client_phone}</div>
        </div>
      </div>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>

    <div class="ag-detail-body">
      <div class="ag-detail-section">
        <div class="ag-detail-section-title">Detalles del turno</div>
        <div class="info-row"><span class="lbl">Barbero</span><span class="val" style="color:${color};font-weight:700;">${a.biz_staff?.icon} ${a.biz_staff?.name||'—'}</span></div>
        <div class="info-row"><span class="lbl">Servicio</span><span class="val">${a.biz_services?.name||'—'}</span></div>
        <div class="info-row"><span class="lbl">Fecha</span><span class="val">${start.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'}).replace(/^\w/,c=>c.toUpperCase())}</span></div>
        <div class="info-row"><span class="lbl">Horario</span><span class="val">${ts} – ${te}</span></div>
        <div class="info-row"><span class="lbl">Estado</span><span class="val"><span class="badge ${STATUS_COLOR[a.status]||'badge-gray'}">${STATUS_LABEL[a.status]||a.status}</span></span></div>
        ${a.deposit_paid>0?`<div class="info-row"><span class="lbl">Seña pagada</span><span class="val" style="color:var(--success)">${formatCLP(a.deposit_paid)} ✓</span></div>`:''}
      </div>

      ${prefHTML}
      ${visitHTML}

      <div class="ag-detail-section ag-notes">
        <div class="ag-detail-section-title">Notas del barbero</div>
        <textarea id="dNotes" rows="2" placeholder="Preferencias, corte solicitado...">${a.notes||''}</textarea>
        <button class="btn btn-ghost" style="font-size:11px;padding:5px 12px;margin-top:6px;" onclick="saveNotes('${a.id}','${a.biz_clients?.id||''}')">Guardar</button>
      </div>
    </div>

    ${statusActions.length?`<div class="action-btns" style="border-top:1px solid var(--border);">${statusActions.join('')}</div>`:''}
  `;

  document.getElementById('detailOverlay').classList.add('open');
};

window.closeDetail=function(){ document.getElementById('detailOverlay').classList.remove('open'); };
window.doStatus=async function(id,status){ await sb.from('biz_appointments').update({status,updated_at:new Date()}).eq('id',id); closeDetail(); renderCalendar(); showToast(`✓ ${STATUS_LABEL[status]}`); };
window.saveNotes=async function(apptId,clientId){ const n=document.getElementById('dNotes')?.value||''; await sb.from('biz_appointments').update({notes:n}).eq('id',apptId); if(clientId) await sb.from('biz_clients').update({notes:n}).eq('id',clientId); showToast('✓ Notas guardadas'); };

// ── Nuevo turno modal ─────────────────────────────────────────────────────────
window.openNuevo=function(){
  document.getElementById('nDate').value=_date.toISOString().slice(0,10);
  document.getElementById('nTime').value='10:00';
  document.getElementById('nStaff').innerHTML=_staff.map(s=>`<option value="${s.id}">${s.icon} ${s.name}</option>`).join('');
  document.getElementById('nService').innerHTML=_services.map(s=>`<option value="${s.id}">${s.name} — ${formatCLP(s.price_clp)}</option>`).join('');
  document.getElementById('nuevoModal').classList.add('open');
};
window.closeNuevo=function(){ document.getElementById('nuevoModal').classList.remove('open'); };

window.saveNuevo=async function(e){
  e.preventDefault();
  const btn=document.getElementById('btnNuevo');
  btn.disabled=true; btn.textContent='Guardando...';
  try{
    const staffId   = document.getElementById('nStaff').value;
    const serviceId = document.getElementById('nService').value;
    const svc       = _services.find(s=>s.id===serviceId);
    const starts    = new Date(`${document.getElementById('nDate').value}T${document.getElementById('nTime').value}`);
    const ends      = new Date(starts.getTime()+(svc?.duration_min||30)*60000);
    const name      = document.getElementById('nName').value.trim();
    const phone     = document.getElementById('nPhone').value.trim();
    const notes     = document.getElementById('nNotes').value.trim();

    await sb.from('biz_clients').upsert({tenant_id:_tid,name,phone},{onConflict:'tenant_id,phone'});
    await sb.from('biz_appointments').insert({
      tenant_id:_tid, staff_id:staffId, service_id:serviceId,
      client_name:name, client_phone:phone, notes,
      starts_at:starts.toISOString(), ends_at:ends.toISOString(), status:'confirmed', deposit_paid:0
    });
    closeNuevo(); renderCalendar(); showToast('✓ Turno creado');
  }catch(err){ showToast('Error: '+err.message); }
  finally{ btn.disabled=false; btn.textContent='Crear turno'; }
};

// ── Init ──────────────────────────────────────────────────────────────────────
(async()=>{
  const user=await requireAuth(['owner','staff','super_admin']);
  if(!user) return;
  _tid=user.tenant_id;
  await renderNav('Agenda');

  const [{data:staff=[]},{data:services=[]},{data:tenant}]=await Promise.all([
    sb.from('biz_staff').select('id,name,color,icon,schedule_json').eq('tenant_id',_tid).eq('active',true).order('created_at'),
    sb.from('biz_services').select('id,name,duration_min,price_clp').eq('tenant_id',_tid).eq('active',true).order('created_at'),
    sb.from('tenants').select('slug,name').eq('id',_tid).single()
  ]);
  _staff=staff; _services=services;

  const slug=tenant?.slug||'ohiggins';
  document.getElementById('shareLink').textContent=`${window.location.origin}/verticales/peluquerias/public/booking.html?t=${slug}`;

  updateToolbar();
  renderMiniCal();
  renderProList();
  await renderCalendar();
})();
</script>
