<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HORIZON · Diagnóstico confirmado</title>
<link rel="icon" type="image/png" href="../../Identidad/Logo ISO.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#07060e;--card:#0f0e1a;--card2:#1a1828;--border:rgba(255,255,255,0.06);
  --h1:#ff6b35;--h2:#ff8c42;--green:#10b981;--text:#e8e6f0;--text2:#9a98a8;--text3:#4a4760;
  --fm:"DM Mono",monospace;--fb:"Plus Jakarta Sans",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--void);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;max-width:480px;width:100%;text-align:center;}
.icon{font-size:48px;margin-bottom:20px;}
.title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--h1),var(--h2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.sub{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:24px;}
.info-block{background:var(--card2);border-radius:8px;padding:16px;margin-bottom:20px;text-align:left;}
.info-row{display:flex;flex-direction:column;gap:3px;margin-bottom:12px;}
.info-row:last-child{margin-bottom:0;}
.info-label{font-family:var(--fm);font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;}
.info-value{font-size:13px;color:var(--text);font-weight:500;}
.status-ok{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:9px;
  letter-spacing:1px;padding:4px 12px;border-radius:4px;background:rgba(16,185,129,.1);
  color:var(--green);margin-bottom:20px;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-size:11px;
  padding:10px 20px;border-radius:6px;text-decoration:none;border:none;cursor:pointer;
  letter-spacing:.5px;transition:.15s;}
.btn-primary{background:var(--h1);color:#fff;}
.btn-primary:hover{background:#e55a28;}
.btn-ghost{background:var(--card2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.crm-note{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:20px;letter-spacing:.5px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <div class="title">Diagnóstico confirmado</div>
  <p class="sub" id="subText">Tu sesión quedó agendada. Benja te va a escribir en breve para preparar bien la sesión.</p>

  <div class="status-ok" id="crmStatus">⏳ Actualizando CRM...</div>

  <div class="info-block" id="infoBlock" style="display:none;">
    <div class="info-row" id="rowNombre" style="display:none;">
      <span class="info-label">Nombre</span>
      <span class="info-value" id="valNombre"></span>
    </div>
    <div class="info-row" id="rowFecha" style="display:none;">
      <span class="info-label">Fecha y hora</span>
      <span class="info-value" id="valFecha"></span>
    </div>
    <div class="info-row" id="rowEmail" style="display:none;">
      <span class="info-label">Email</span>
      <span class="info-value" id="valEmail"></span>
    </div>
  </div>

  <div class="btns">
    <a href="/" class="btn btn-ghost">← Volver al inicio</a>
  </div>
  <p class="crm-note" id="crmNote"></p>
</div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);

  // Cal.com redirect variables: {startTime}, {email}, {name}, {location}
  const fechaRaw  = params.get('fecha')  || params.get('startTime') || '';
  const emailRaw  = params.get('email')  || '';
  const nombreRaw = params.get('nombre') || params.get('name') || '';
  const linkRaw   = params.get('link')   || params.get('location') || '';

  // Formatear fecha para mostrar
  function formatFecha(str){
    if(!str) return '';
    try{
      const d = new Date(str);
      return d.toLocaleString('es-CL',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
    }catch(e){ return str; }
  }

  // Normalizar fecha a formato datetime-local (YYYY-MM-DDTHH:mm)
  function toDatetimeLocal(str){
    if(!str) return '';
    try{
      const d = new Date(str);
      // Ajustar a hora local
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0,16);
    }catch(e){ return ''; }
  }

  // Mostrar info al usuario
  if(nombreRaw){
    document.getElementById('rowNombre').style.display='flex';
    document.getElementById('valNombre').textContent = nombreRaw;
    document.getElementById('infoBlock').style.display='block';
  }
  if(fechaRaw){
    document.getElementById('rowFecha').style.display='flex';
    document.getElementById('valFecha').textContent = formatFecha(fechaRaw);
    document.getElementById('infoBlock').style.display='block';
  }
  if(emailRaw){
    document.getElementById('rowEmail').style.display='flex';
    document.getElementById('valEmail').textContent = emailRaw;
    document.getElementById('infoBlock').style.display='block';
  }

  // Buscar el lead en localStorage y actualizar
  function actualizarLead(){
    try{
      const leads = JSON.parse(localStorage.getItem('horizon_leads')) || [];
      if(!leads.length){
        document.getElementById('crmStatus').textContent = '⚠️ No se encontró el lead en CRM';
        document.getElementById('crmNote').textContent = 'Actualizalo manualmente en horizonweb.cl/crm';
        return false;
      }

      // Buscar por email (más confiable) o por nombre si no hay email
      let lead = null;
      if(emailRaw){
        lead = leads.find(l => l.email && l.email.toLowerCase() === emailRaw.toLowerCase());
      }
      if(!lead && nombreRaw){
        lead = leads.find(l => l.nombre && l.nombre.toLowerCase().includes(nombreRaw.toLowerCase().split(' ')[0]));
      }
      // Fallback: el lead más reciente
      if(!lead){
        lead = leads.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''))[0];
      }

      if(!lead){
        document.getElementById('crmStatus').textContent = '⚠️ Lead no encontrado en CRM';
        document.getElementById('crmNote').textContent = 'Actualizalo manualmente en horizonweb.cl/crm';
        return false;
      }

      // Actualizar campos
      const fechaLocal = toDatetimeLocal(fechaRaw);
      if(fechaLocal) lead.reunionFecha = fechaLocal;
      if(linkRaw)    lead.calLink      = linkRaw;
      if(!lead.historial) lead.historial = [];
      lead.historial.push({
        fecha: new Date().toLocaleString('es-CL'),
        texto: 'Booking confirmado en Cal.com' +
               (fechaLocal ? ' — Sesión: ' + formatFecha(fechaRaw) : '') +
               (linkRaw ? ' — Link: ' + linkRaw : '')
      });
      lead.updatedAt = new Date().toISOString();

      // Guardar
      const idx = leads.findIndex(l=>l.id===lead.id);
      if(idx>-1) leads[idx] = lead;
      localStorage.setItem('horizon_leads', JSON.stringify(leads));

      document.getElementById('crmStatus').textContent = '✅ CRM actualizado automáticamente';
      document.getElementById('crmStatus').style.cssText += 'background:rgba(16,185,129,.15);';
      document.getElementById('crmNote').textContent = 'Lead: ' + (lead.nombre||lead.email||'') + ' — horizonweb.cl/crm';
      return true;
    }catch(e){
      document.getElementById('crmStatus').textContent = '⚠️ Error al actualizar CRM';
      document.getElementById('crmNote').textContent = String(e);
      return false;
    }
  }

  // Pequeño delay para que el localStorage del form haya terminado de escribir
  setTimeout(actualizarLead, 800);
})();
</script>
</body>
</html>
