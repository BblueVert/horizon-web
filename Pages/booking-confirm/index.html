<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>HORIZON · Diagnóstico confirmado</title>
<link rel="icon" type="image/png" href="../../Identidad/Logo ISO.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#07060e;--card:#0f0e1a;--card2:#1a1828;--border:rgba(255,255,255,0.06);
  --h1:#ff6b35;--h2:#ff8c42;--green:#10b981;--text:#e8e6f0;--text2:#9a98a8;--text3:#4a4760;
  --fm:"DM Mono",monospace;--fb:"Plus Jakarta Sans",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--void);color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;max-width:480px;width:100%;text-align:center;}
.icon{font-size:48px;margin-bottom:20px;}
.title{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--h1),var(--h2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.sub{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:24px;}
.info-block{background:var(--card2);border-radius:8px;padding:16px;margin-bottom:20px;text-align:left;}
.info-row{display:flex;flex-direction:column;gap:3px;margin-bottom:12px;}
.info-row:last-child{margin-bottom:0;}
.info-label{font-family:var(--fm);font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;}
.info-value{font-size:13px;color:var(--text);font-weight:500;}
.status-ok{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:9px;
  letter-spacing:1px;padding:4px 12px;border-radius:4px;background:rgba(16,185,129,.1);
  color:var(--green);margin-bottom:20px;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-size:11px;
  padding:10px 20px;border-radius:6px;text-decoration:none;border:none;cursor:pointer;
  letter-spacing:.5px;transition:.15s;}
.btn-primary{background:var(--h1);color:#fff;}
.btn-primary:hover{background:#e55a28;}
.btn-ghost{background:var(--card2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.crm-note{font-family:var(--fm);font-size:9px;color:var(--text3);margin-top:20px;letter-spacing:.5px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <div class="title">Diagnóstico confirmado</div>
  <p class="sub" id="subText">Tu sesión quedó agendada. Benja te va a escribir en breve para preparar bien la sesión.</p>

  <div class="status-ok" id="crmStatus">⏳ Actualizando CRM...</div>

  <div class="info-block" id="infoBlock" style="display:none;">
    <div class="info-row" id="rowNombre" style="display:none;">
      <span class="info-label">Nombre</span>
      <span class="info-value" id="valNombre"></span>
    </div>
    <div class="info-row" id="rowFecha" style="display:none;">
      <span class="info-label">Fecha y hora</span>
      <span class="info-value" id="valFecha"></span>
    </div>
    <div class="info-row" id="rowEmail" style="display:none;">
      <span class="info-label">Email</span>
      <span class="info-value" id="valEmail"></span>
    </div>
  </div>

  <div class="btns">
    <a href="/" class="btn btn-ghost">← Volver al inicio</a>
  </div>
  <p class="crm-note" id="crmNote"></p>
</div>

<script>
(function(){
  const stored = JSON.parse(sessionStorage.getItem('horizon_booking') || '{}');
  sessionStorage.removeItem('horizon_booking');

  // Fallback a query params para compatibilidad con Cal.com redirects
  const params    = new URLSearchParams(window.location.search);
  const fechaRaw  = stored.startTime   || params.get('startTime')     || params.get('fecha') || '';
  const emailRaw  = (stored.attendeeEmail || params.get('attendeeEmail') || params.get('email') || '').toLowerCase().trim();
  const nombreRaw = stored.attendeeName  || params.get('attendeeName')  || params.get('nombre') || params.get('name') || '';
  const linkRaw   = stored.meetLink      || params.get('meetLink')       || params.get('location') || params.get('link') || '';

  function formatFecha(str){
    if(!str) return '';
    try{
      // reunion_fecha se guarda como "hora Chile = hora UTC" (sin conversión de zona).
      // Mostramos en UTC para que coincida con el horario elegido por el usuario.
      return new Intl.DateTimeFormat('es-CL',{
        weekday:'long', day:'numeric', month:'long',
        hour:'2-digit', minute:'2-digit', timeZone:'America/Santiago'
      }).format(new Date(str));
    }
    catch(e){ return str; }
  }

  if(nombreRaw){ document.getElementById('rowNombre').style.display='flex'; document.getElementById('valNombre').textContent=nombreRaw; document.getElementById('infoBlock').style.display='block'; }
  if(fechaRaw){  document.getElementById('rowFecha').style.display='flex';  document.getElementById('valFecha').textContent=formatFecha(fechaRaw); document.getElementById('infoBlock').style.display='block'; }
  if(emailRaw){  document.getElementById('rowEmail').style.display='flex';  document.getElementById('valEmail').textContent=emailRaw; document.getElementById('infoBlock').style.display='block'; }

  async function actualizarLead(){
    try{
      if(!emailRaw){
        document.getElementById('crmStatus').textContent = '⚠️ Email no recibido';
        return;
      }

      const r = await fetch('/api/booking-confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailRaw, nombre: nombreRaw, cal_link: linkRaw || '', reunion_fecha: fechaRaw || '' })
      });

      if(r.ok){
        document.getElementById('crmStatus').textContent = '✅ Agenda registrada — Benja te escribe en breve';
        document.getElementById('crmStatus').style.background = 'rgba(16,185,129,.15)';
        document.getElementById('crmNote').textContent = emailRaw;
      } else {
        document.getElementById('crmStatus').textContent = '⚠️ Error al registrar agenda';
        document.getElementById('crmNote').textContent = 'Status ' + r.status;
      }
    }catch(e){
      document.getElementById('crmStatus').textContent = '⚠️ Error al actualizar CRM';
      document.getElementById('crmNote').textContent = String(e);
    }
  }

  actualizarLead();
})();
</script>
</body>
</html>
